site_name: Brent_note
site_author: Brent
site_url: https://brent050830.xyz
site_description: Brent的笔记本

theme:
  logo:
  font:
    text: JetBrains Mono, LXGW WenKai Screen GB Screen 
    code: JetBrains Mono, Consolas
  favicon:
  custom_dir: docs/overrides  # 必需配置！！！
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
  language: zh
  name: material
  custom_dir: docs/overrides  #主要是这一行
  palette:
    # primary: deep purple
    # accent: orange


    # Palette toggle for light mode
    - scheme: default
      primary: deep purple
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      # primary: deep purple
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

  features:
    - announce.dismiss #呈现可标记为由用户读取的临时公告，可以包含一个用于取消当前公告的按钮
    - toc.follow
    - content.footnote.tooltips
    - content.action.edit  # 支持编辑按钮 在页面右上角添加编辑按钮，跳转到源码仓库的对应文件
    # - navigation.instant
    #- header.autohide  #自动隐藏
    - navigation.tracking #地址栏中的 URL 将自动更新为在目录中突出显示的活动锚点
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs #顶级部分将呈现在上面视口标题下方的菜单层中，但在移动设备上保持原样
    # - navigation.tabs.sticky  #启用粘性选项卡后，导航选项卡将锁定在标题下方，并在向下滚动时始终保持可见
    # - navigation.sections #启用部分后，顶级部分在边栏中呈现为1220px以上视口的组，但在移动设备上保持原样
    - navigation.top # 返回顶部的按钮 在上滑时出现
    - navigation.footer #页脚将呈现在边栏中，但在移动设备上保持原样
    - search.suggest # 搜索输入一些字母时推荐补全整个单词
    - search.highlight # 搜索出的文章关键词加入高亮
    - search.share #搜索分享按钮
    # - navigation.expand # 打开Tab时左侧目录全部展开
    - navigation.indexes #启用节索引页后，可以将文档直接附加到节
    - content.tabs.link
    - content.tooltips
    - content.code.copy #代码复制
    - content.code.select
    - content.action.edit
    - content.action.view
    - content.code.annotate
  language: zh # 一些提示性的文字会变成中文

  # icon:
  #   repo: fontawesome/brands/github #右上角图标
  #   logo: logo

plugins:
  - search
  - glightbox
  - encryptcontent: {}
  # - mermaid2
  - markmap
  - minify:
      minify_html: true
  # - pub-obsidian
  # - privacy:
  #     enabled: !ENV [CI, false]
  - blog:
      post_date_format: full #时间
      draft: true
      draft_if_future_date: true #自动将具有未来日期的帖子标记为草稿
      post_readtime: true
      post_readtime_words_per_minute: 265 #计算帖子的阅读时间时读者每分钟预计阅读的字数
      post_url_format: "{date}/{slug}"
      # categories_slugify: !!python/object/apply:pymdownx.slugs.slugify
      #   kwds:
      #     case: lower
      pagination_url_format: "page/{page}"
      authors_file: "{blog}/.authors.yml" #作者信息
  - tags:
      tags_file: tags.md
  - git-revision-date-localized:
      enable_creation_date: true
  - callouts  

# extra:
#   social:
#     - icon: fontawesome/brands/mastodon 
#       link: https://fosstodon.org/@squidfunk
#   generator: false

markdown_extensions:
  - abbr
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true
      title: On this page
  - tables
  # - pymdownx.escapeall:
  #     hardbreak: True  # 硬换行
  #     nbsp: True  # 不断行空格
  - pymdownx.arithmatex:
      generic: true
  # - pymdownx.caret
  - pymdownx.betterem
  - pymdownx.critic
  - nl2br
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.mark
  # - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true # 固定标题位置为当前位置
      toc_depth: 5
  - pymdownx.highlight: # 代码块高亮
      anchor_linenums: true
      linenums: true # 显示行号
      auto_title: true # 显示编程语言名称
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/katex.js
  - https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/auto-render.min.js
  # - javascripts/mathjax.js
  # - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js
  - javascripts/extra.js
  - javascripts/script.js
  - javascripts/custom.js
  - javascripts/toc.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css
  - stylesheets/yuanjiao.css
  - stylesheets/extra.css
  - stylesheets/styles.css  # 你将 CSS 存储的文件路径
  # - custom.css
  - stylesheets/fold_toc.css
  # - https://gcore.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.1.0/style.css
  # - https://gcore.jsdelivr.net/npm/lxgw-wenkai-webfont@1.1.0/style.css
  # - https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap

hooks:
  - docs/overrides/hooks/reading_time.py  
  # - docs/overrides/hooks/fix_math_blocks.py
